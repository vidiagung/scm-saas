version: '3.9'

services:

  # ── TimescaleDB ──────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: scm_timescaledb
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER:     scm
      POSTGRES_PASSWORD: scm123
      POSTGRES_DB:       scm_saas
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scm -d scm_saas']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── WebSocket server (apps/ws) ───────────────────────────────────────────────
  ws:
    build:
      context: ./apps/ws
      dockerfile: Dockerfile
    container_name: scm_ws
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://scm:scm123@timescaledb:5432/scm_saas?schema=public
      NODE_ENV:     production
    depends_on:
      timescaledb:
        condition: service_healthy

  # ── SvelteKit web app (apps/web) ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: scm_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV:         production
      JWT_SECRET:       ${JWT_SECRET:-changeme_in_production}
      PUBLIC_WS_URL:    ws://localhost:3001
    depends_on:
      - ws

volumes:
  timescale_data: